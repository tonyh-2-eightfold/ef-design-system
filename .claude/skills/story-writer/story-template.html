<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Story Backlog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6f8; color: #1a1d23; line-height: 1.5; font-size: 14px; padding: 24px; max-width: 960px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .meta { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    .badge.mvp { background: #dbeafe; color: #1e40af; }
    .badge.phase2 { background: #d1fae5; color: #065f46; }
    .badge.phase3 { background: #f3f4f6; color: #4b5563; }
    .badge.persona { background: #fef3c7; color: #92400e; }
    .badge.id { background: #e0e7ff; color: #3730a3; font-family: monospace; border-radius: 4px; }
    .wf-heading { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin: 20px 0 8px; border-bottom: 2px solid #e2e5ea; padding-bottom: 4px; }
    .card { background: #fff; border: 1px solid #e2e5ea; border-radius: 8px; margin-bottom: 6px; }
    .card-hdr { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; }
    .card-hdr:hover { background: #f9fafb; border-radius: 8px; }
    .card-title { flex: 1; font-weight: 500; }
    .arrow { width: 16px; height: 16px; color: #9ca3af; transition: transform 0.15s; flex-shrink: 0; }
    .card.open .arrow { transform: rotate(90deg); }
    .card-body { display: none; padding: 0 14px 14px; }
    .card.open .card-body { display: block; }
    .stmt { background: #f8fafc; border-left: 3px solid #3b82f6; padding: 10px 14px; border-radius: 0 6px 6px 0; margin-bottom: 12px; }
    .stmt strong { color: #1e40af; }
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7280; margin: 10px 0 4px; }
    ol { padding-left: 18px; }
    ol li, ul li { margin-bottom: 3px; color: #374151; font-size: 13px; }
    .ui-grid { display: grid; grid-template-columns: 110px 1fr; gap: 2px 10px; font-size: 13px; }
    .ui-grid dt { font-weight: 600; color: #6b7280; }
    .ui-grid dd { color: #374151; }
    .ac-item { display: flex; gap: 6px; align-items: flex-start; font-size: 13px; padding: 2px 0; }
    .ac-box { width: 14px; height: 14px; border: 2px solid #d1d5db; border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
    .dep { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: #fce7f3; color: #9d174d; cursor: pointer; margin-right: 4px; }
    .cite { font-size: 12px; color: #6b7280; font-style: italic; margin-top: 8px; padding-top: 6px; border-top: 1px solid #f3f4f6; }
  </style>
</head>
<body>

<h1 id="title"></h1>
<div class="meta" id="meta"></div>
<div id="root"></div>

<script>
/* === DATA — Loaded from user-stories.json via fetch === */

var PROJECT_META = null;
var STORIES = [];

function loadData() {
  var title = document.getElementById('title');
  var meta = document.getElementById('meta');
  var root = document.getElementById('root');
  title.textContent = 'Loading stories...';
  meta.textContent = '';
  root.innerHTML = '<p style="color:#6b7280;padding:40px;text-align:center;">Loading story data...</p>';

  fetch('./user-stories.json')
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      PROJECT_META = data.projectMeta;
      STORIES = data.stories;
      render();
    })
    .catch(function(err) {
      title.textContent = 'User Story Backlog';
      meta.textContent = '';
      root.innerHTML = '<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:16px;margin:20px 0;color:#991b1b;">' +
        '<strong>Could not load story data.</strong><br>' +
        '<span style="font-size:13px;">Expected <code>user-stories.json</code> in the same directory.<br>' +
        'Error: ' + err.message + '</span></div>';
    });
}

/* === RENDERING === */

function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
function pcls(p) { return p === 'MVP' ? 'mvp' : p === 'Phase 2' ? 'phase2' : 'phase3'; }

function render() {
  var m = PROJECT_META;
  document.getElementById('title').textContent = m.name;
  document.getElementById('meta').innerHTML = m.totalStories + ' stories &middot; ' +
    '<span class="badge mvp">MVP: ' + m.mvpCount + '</span> ' +
    (m.phase2Count ? '<span class="badge phase2">Phase 2: ' + m.phase2Count + '</span> ' : '') +
    (m.phase3Count ? '<span class="badge phase3">Phase 3: ' + m.phase3Count + '</span> ' : '') +
    '&middot; ' + m.lastUpdated;

  var groups = {}, order = [];
  STORIES.forEach(function(s) {
    if (!groups[s.workflow]) { groups[s.workflow] = []; order.push(s.workflow); }
    groups[s.workflow].push(s);
  });

  var h = '';
  order.forEach(function(wf) {
    h += '<div class="wf-heading">' + esc(wf) + '</div>';
    groups[wf].forEach(function(s) {
      h += '<div class="card" id="card-' + s.id + '">';
      h += '<div class="card-hdr" onclick="toggle(\'' + s.id + '\')">';
      h += '<span class="badge id">' + esc(s.id) + '</span>';
      h += '<span class="card-title">' + esc(s.title) + '</span>';
      h += '<span class="badge persona">' + esc(s.persona) + '</span>';
      h += '<span class="badge ' + pcls(s.priority) + '">' + esc(s.priority) + '</span>';
      h += '<svg class="arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"/></svg>';
      h += '</div><div class="card-body">';
      h += '<div class="stmt">As a <strong>' + esc(s.asA) + '</strong>, I want to <strong>' + esc(s.iWantTo) + '</strong> so that <strong>' + esc(s.soThat) + '</strong></div>';
      if (s.workflowBreakdown && s.workflowBreakdown.length) {
        h += '<div class="section-label">Workflow</div><ol>';
        s.workflowBreakdown.forEach(function(st) { h += '<li>' + esc(st) + '</li>'; });
        h += '</ol>';
      }
      if (s.uiDetails) {
        h += '<div class="section-label">UI Details</div><dl class="ui-grid">';
        ['screen','visibleTo','keyFields','filters','configurableOptions'].forEach(function(k) {
          if (s.uiDetails[k]) h += '<dt>' + esc(k.replace(/([A-Z])/g,' $1')) + '</dt><dd>' + esc(s.uiDetails[k]) + '</dd>';
        });
        h += '</dl>';
      }
      if (s.acceptanceCriteria && s.acceptanceCriteria.length) {
        h += '<div class="section-label">Acceptance Criteria</div>';
        s.acceptanceCriteria.forEach(function(c) { h += '<div class="ac-item"><span class="ac-box"></span>' + esc(c) + '</div>'; });
      }
      if (s.dependsOn && s.dependsOn.length) {
        h += '<div class="section-label">Depends on</div>';
        s.dependsOn.forEach(function(d) { h += '<span class="dep" onclick="scrollTo(\'' + d + '\')">' + esc(d) + '</span>'; });
      }
      if (s.researchCitation) h += '<div class="cite">' + esc(s.researchCitation) + '</div>';
      h += '</div></div>';
    });
  });
  document.getElementById('root').innerHTML = h;
  if (location.hash) scrollTo(location.hash.slice(1));
}

function toggle(id) {
  var el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('open');
}
function expandAll() { document.querySelectorAll('.card').forEach(function(c) { c.classList.add('open'); }); }
function collapseAll() { document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('open'); }); }
function scrollTo(id) {
  var el = document.getElementById('card-' + id);
  if (!el) return;
  el.classList.add('open');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
