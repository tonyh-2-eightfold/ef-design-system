name: Mirror fork → upstream

# Lives in this repo AND in forks. On the upstream repo this is a no-op
# (the first step's `if: github.event.repository.fork` is false).
# On forks, every push to main fast-forwards the upstream's main if the
# fork is strictly ahead of (or equal to) upstream.
#
# Pair this with sync-from-upstream.yml (the opposite direction). Together
# they keep upstream and fork at parity:
#
#   - Designer clicks "Sync to repo" on a Google Doc → Apps Script writes
#     to the FORK's main → this action fires → upstream main fast-forwards.
#   - Tony pushes to upstream directly → sync-from-upstream.yml (cron) pulls
#     upstream into fork within 15 min.
#
# The two actions are idempotent in the no-op case so they can't ping-pong.
#
# Requires `UPSTREAM_PAT` repository secret on the fork: a fine-grained PAT
# with `contents: write` on the upstream repo. See docs/CONTENT-SYNC.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-fork-to-upstream
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    # Only run on forks. On upstream this is a no-op (different action runs there).
    if: github.event.repository.fork
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to upstream if we're a strict ancestor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_PAT: ${{ secrets.UPSTREAM_PAT }}
        run: |
          set -e

          if [ -z "$UPSTREAM_PAT" ]; then
            echo "::warning::UPSTREAM_PAT not configured. See docs/CONTENT-SYNC.md."
            exit 0
          fi

          upstream=$(gh api "/repos/${{ github.repository }}" --jq '.parent.full_name')
          if [ -z "$upstream" ] || [ "$upstream" = "null" ]; then
            echo "::warning::No parent repo detected. Skipping."
            exit 0
          fi
          echo "Upstream detected: $upstream"

          git remote add upstream "https://x-access-token:${UPSTREAM_PAT}@github.com/${upstream}.git"
          git fetch upstream main

          if [ "$(git rev-parse HEAD)" = "$(git rev-parse upstream/main)" ]; then
            echo "::notice::Already in sync with upstream. No-op."
            exit 0
          fi

          # Only push if upstream's main is a strict ancestor of our HEAD
          # (i.e. we're ahead, fast-forward possible).
          if git merge-base --is-ancestor upstream/main HEAD; then
            git push upstream HEAD:main
            echo "::notice::✅ Fast-forwarded $upstream main to $(git rev-parse --short HEAD)"
          else
            echo "::warning::Upstream has commits not in this fork. Skipping push to avoid clobbering. sync-from-upstream.yml will reconcile within 15 min."
          fi
